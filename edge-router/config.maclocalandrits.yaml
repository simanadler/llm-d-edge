# llm-d Edge Router Configuration for Integration Testing with Stub Server
# This configuration uses the llm-d stub server instead of a real Kubernetes cluster

edge:
  # Using real model on mac, not a stub
  platform: "macos"
  
  # Device configuration
  device:
    type: "auto"
    memory: "auto"
    storage: "auto"
  
  # Routing configuration
  routing:
    # Routing policy: local-first, remote-first, hybrid, cost-optimized, latency-optimized, mobile-optimized
    policy: "local-first"
    fallback: "remote"
  
  # Models configuration
  models:
    # Local models
    local:
      - name: "Qwen/Qwen2.5-3B-Instruct"
        path: "~/Library/Application Support/llm-d/models/Qwen--Qwen2.5-3B-Instruct"
        format: "mlx"
        quantization: "4bit"
        priority: 1
    
    # Remote cluster configuration (using RITS)
    remote:
      cluster_url: "https://inference-3scale-apicast-production.apps.rits.fmaas.res.ibm.com/qwen2-5-72b-instruct"
      timeout: 30
      headers:  # Optional custom headers
        RITS_API_KEY: "xxx"
  
  # Routing rules (evaluated in order)
  routing_rules:
    # Route large models to remote (stub)
    - condition: "model_size > 7B"
      action: "route_remote"
    
    # Route high token requests to remote (stub)
    - condition: "estimated_tokens > 2000"
      action: "route_remote"
    
    # Prefer local for small requests
    - condition: "estimated_tokens < 500"
      action: "route_local"

