# llm-d Edge Router Configuration for Integration Testing with Stub Server
# This configuration uses the llm-d stub server instead of a real Kubernetes cluster

edge:
  # Platform: use "local-stub" for integration testing without real models
  platform: "local-stub"
  
  # Device configuration
  device:
    type: "auto"
    memory: "auto"
    storage: "auto"
  
  # Routing configuration
  routing:
    # Routing policy: local-first, remote-first, hybrid, cost-optimized, latency-optimized, mobile-optimized
    policy: "hybrid"
    fallback: "remote"
  
  # Models configuration
  models:
    # Local models (local-stub engine doesn't require real model files)
    local:
      - name: "local-stub-model-small"
        path: "/tmp/stub-model-small"
        format: "gguf"
        quantization: "q4"
        priority: 1
        # Model matching configuration - allows this model to substitute for others
        matching:
          can_substitute:
            - pattern: "gpt-3.5*"      # Can substitute for GPT-3.5 variants
            - pattern: "*3b*"          # Can substitute for any 3B model
            - pattern: "qwen*"         # Can substitute for Qwen models
          exclude_patterns:
            - "gpt-4*"                 # Don't substitute for GPT-4
      
      - name: "local-stub-model-large"
        path: "/tmp/local-stub-model-large"
        format: "gguf"
        quantization: "q8"
        priority: 2
        # Model matching configuration
        matching:
          can_substitute:
            - pattern: "gpt-4*"        # Can substitute for GPT-4 variants
            - pattern: "*7b*"          # Can substitute for any 7B model
            - pattern: "llama*"        # Can substitute for Llama models
    
    # Remote cluster configuration (using stub server)
    remote:
      cluster_url: "http://localhost:8081"
      timeout: 30
  
  # Routing rules (evaluated in order)
  routing_rules:
    # Route large models to remote (stub)
    - condition: "model_size > 7B"
      action: "route_remote"
    
    # Route high token requests to remote (stub)
    - condition: "estimated_tokens > 2000"
      action: "route_remote"
    
    # Prefer local for small requests
    - condition: "estimated_tokens < 500"
      action: "prefer_local"