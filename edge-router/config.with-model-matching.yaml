# llm-d Edge Router Configuration with Model Matching
# This example shows how to configure model capabilities and matching rules

edge:
  platform: auto  # auto-detect: macos, windows, android, ios
  
  device:
    type: auto
    memory: auto
    storage: auto
  
  routing:
    policy: hybrid  # local-first, remote-first, hybrid, cost-optimized, latency-optimized, mobile-optimized
    fallback: remote
  
  models:
    local:
      # Example 1: Llama 3.2 3B with full capabilities and matching rules
      - name: "meta-llama/Llama-3.2-3B"
        format: "gguf"
        quantization: "4bit"
        priority: 1
        
        # Model capabilities (all optional)
        capabilities:
          parameter_count: "3B"
          context_length: 8192
          model_family: "llama"
          quality_tier: "medium"
          
          # Task suitability scores (0.0-1.0) - optional
          tasks:
            chat: 0.9
            code: 0.7
            reasoning: 0.6
            creative_writing: 0.8
            summarization: 0.85
          
          # Domain expertise (0.0-1.0) - optional
          domains:
            general: 0.9
            technical: 0.7
            medical: 0.3
            legal: 0.3
        
        # Matching rules - optional
        matching:
          # This model can substitute for these patterns
          can_substitute:
            - pattern: "gpt-3.5*"
            - pattern: "llama*3*"
            - pattern: "*3b*"
          
          # This model should NOT substitute for these patterns
          exclude_patterns:
            - "gpt-4*"
            - "claude-3-opus*"
      
      # Example 2: Qwen 0.6B with minimal configuration
      - name: "Qwen/Qwen3-0.6B"
        format: "gguf"
        quantization: "4bit"
        priority: 2
        
        # Minimal capabilities
        capabilities:
          parameter_count: "0.6B"
          model_family: "qwen"
          quality_tier: "low"
        
        # Simple matching rules
        matching:
          can_substitute:
            - pattern: "*0.5b*"
            - pattern: "*1b*"
          
          exclude_patterns:
            - "gpt-4*"
            - "*7b*"
            - "*13b*"
      
      # Example 3: Model with no capabilities or matching (will use defaults)
      - name: "TinyLlama/TinyLlama-1.1B"
        format: "gguf"
        quantization: "4bit"
        priority: 3
        # No capabilities or matching - will only match exact name
    
    remote:
      cluster_url: "https://llm-d.example.com"
      auth_token: "${LLMD_AUTH_TOKEN}"
      timeout: 60

